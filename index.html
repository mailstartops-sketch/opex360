// ── Radar Chart ──────────────────────────────────────────────
const RadarChart = ({ scores, size = 300, animated = false }) => {
  const [progress, setProgress] = useState(animated ? 0 : 1);
  const center = size / 2;
  const radius = size * 0.34;
  const dims = SECTIONS.length;

  useEffect(() => {
    if (!animated) return;
    let start = null;
    const animate = (ts) => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / 1400, 1);
      setProgress(p * p * (3 - 2 * p));
      if (p < 1) requestAnimationFrame(animate);
    };
    const t = setTimeout(() => requestAnimationFrame(animate), 300);
    return () => clearTimeout(t);
  }, [animated]);

  const getPoint = (index, value) => {
    const angle = (Math.PI * 2 * index) / dims - Math.PI / 2;
    const r = (value / 100) * radius * progress;
    return { x: center + r * Math.cos(angle), y: center + r * Math.sin(angle) };
  };

  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {[20,40,60,80,100].map((level) => {
        const pts = Array.from({length:dims}, (_, i) => {
          const a = (Math.PI * 2 * i) / dims - Math.PI / 2;
          const r = (level / 100) * radius;
          return `${center + r * Math.cos(a)},${center + r * Math.sin(a)}`;
        }).join(" ");
        return <polygon key={level} points={pts} fill="none"
          stroke={level === 100 ? "rgba(200,165,92,0.3)" : "rgba(255,255,255,0.08)"}
          strokeWidth={level === 100 ? 1.5 : 0.7} />;
      })}
      {SECTIONS.map((_, i) => {
        const a = (Math.PI * 2 * i) / dims - Math.PI / 2;
        return <line key={i} x1={center} y1={center}
          x2={center + radius * Math.cos(a)} y2={center + radius * Math.sin(a)}
          stroke="rgba(255,255,255,0.08)" strokeWidth="0.7" />;
      })}
      <polygon
        points={SECTIONS.map((s, i) => { const pt = getPoint(i, scores[s.id] || 0); return `${pt.x},${pt.y}`; }).join(" ")}
        fill="rgba(200,165,92,0.15)" stroke="#C8A55C" strokeWidth="2"
      />
      {SECTIONS.map((s, i) => {
        const pt = getPoint(i, scores[s.id] || 0);
        return <circle key={s.id} cx={pt.x} cy={pt.y} r="4.5" fill={s.color} stroke="rgba(255,255,255,0.3)" strokeWidth="1.5" />;
      })}
      {SECTIONS.map((s, i) => {
        const a = (Math.PI * 2 * i) / dims - Math.PI / 2;
        const lr = radius + 28;
        const x = center + lr * Math.cos(a);
        const y = center + lr * Math.sin(a);
        const anchor = Math.abs(Math.cos(a)) < 0.15 ? "middle" : Math.cos(a) > 0 ? "start" : "end";
        const shortTitle = s.title.split(" ")[0];
        return (
          <text key={s.id} x={x} y={y} textAnchor={anchor} dominantBaseline="middle"
            style={{fontFamily:"'DM Sans',sans-serif", fontSize:10, fontWeight:600, fill:s.color}}>
            {shortTitle}
          </text>
        );
      })}
    </svg>
  );
};

    .glabel { font-family:'DM Sans',sans-serif; font-size:12px; color:#a79488; text-align:left; padding-left:2px; margin-bottom:-4px; display:flex; align-items:center; gap:4px; }
    .greq { color:#d8613c; }
    .ginp { width:100%; padding:13px 16px; border:1.5px solid rgba(255,255,255,.12); border-radius:8px; background:rgba(255,255,255,.07); font-family:'DM Sans',sans-serif; font-size:14px; color:#FAFAF7; outline:none; transition:border-color .2s; }
    .ginp:focus { border-color:#C8A55C; }
    .ginp::placeholder { color:#3d5a7a; }
    .ginp-err { border-color:#C25550 !important; }
    .gerr { color:#FF7070; font-size:12px; font-family:'DM Sans',sans-serif; text-align:left; padding-left:2px; }
    .egate-cta { width:100%; padding:15px; background:#f47b20; color:#fff; border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:15px; font-weight:600; cursor:pointer; transition:background .2s; }
    .egate-cta:hover { background:#d8613c; }
    .egate-fine { font-family:'DM Sans',sans-serif; font-size:11px; color:#3d5a7a; text-align:center; margin-top:6px; }

    /* Results */
    .res-score-block { background:linear-gradient(160deg,#08284e,#0d3a6a); border-radius:18px; padding:40px 32px; text-align:center; margin-bottom:20px; }
    .res-brand { font-family:'DM Sans',sans-serif; font-size:11px; letter-spacing:3px; color:#00aedc; margin-bottom:16px; }
    .res-num { font-family:'DM Sans',sans-serif; font-size:80px; font-weight:700; color:#f6f6f5; line-height:1; }
    .res-denom { font-size:28px; font-weight:400; color:#a79488; }
    .res-badge { display:inline-block; padding:5px 18px; border-radius:20px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; margin:12px 0 6px; }
    .res-sub { font-family:'DM Sans',sans-serif; font-size:13px; color:#967f71; }
    .critical-box { background:rgba(212,90,48,0.1); border-left:3px solid #d8613c; border-radius:0 10px 10px 0; padding:18px 20px; margin-bottom:18px; }
    .critical-title { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:700; letter-spacing:1.5px; color:#f47b20; margin-bottom:10px; }
    .critical-dims { display:flex; gap:8px; flex-wrap:wrap; }
    .critical-chip { background:rgba(226,75,74,0.12); border:0.5px solid rgba(226,75,74,0.3); border-radius:16px; padding:5px 14px; font-family:'DM Sans',sans-serif; font-size:13px; color:#C25550; font-weight:500; }
    .radar-block { background:linear-gradient(160deg,#08284e,#0d3a6a); border-radius:14px; padding:24px; display:flex; flex-direction:column; align-items:center; margin-bottom:18px; }
    .promise-box { background:#fff; border:1px solid #EEEEE8; border-radius:14px; padding:28px 32px; text-align:center; margin-bottom:18px; }
    .promise-icon { width:52px; height:52px; border-radius:50%; background:rgba(107,143,113,.1); display:flex; align-items:center; justify-content:center; margin:0 auto 14px; font-size:22px; color:#6B8F71; }
    .promise-box h3 { font-size:20px; font-weight:400; margin-bottom:8px; font-family:'Source Serif 4',serif; }
    .promise-box p { font-size:14px; color:#666; line-height:1.8; font-weight:300; max-width:420px; margin:0 auto; }
    .promise-box p strong { color:#1A1A1A; font-weight:600; }
    .wa-add-box { background:#fff; border:1px solid #EEEEE8; border-radius:12px; padding:20px 24px; margin-bottom:18px; }
    .wa-add-label { font-family:'DM Sans',sans-serif; font-size:13px; color:#666; margin-bottom:10px; }
    .wa-row { display:flex; gap:10px; }
    .wa-inp { flex:1; padding:11px 14px; border:1.5px solid #E0E0D8; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:14px; color:#1A1A1A; background:#fff; outline:none; transition:border-color .2s; }
    .wa-inp:focus { border-color:#25D366; }
    .wa-inp::placeholder { color:#BBB; }
    .wa-btn { padding:11px 18px; background:#25D366; color:#fff; border:none; border-radius:8px; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:600; cursor:pointer; white-space:nowrap; }
    .wa-btn:hover { background:#1ea855; }
    .wa-done { font-family:'DM Sans',sans-serif; font-size:13px; color:#6B8F71; text-align:center; padding:8px 0; }

    @media(max-width:700px) {
      .topbar { padding:0 18px; }
      .wrap { padding:82px 18px 60px; }
      .dims-row { grid-template-columns:repeat(2,1fr); }
      .scale { flex-wrap:wrap; }
      .sb { min-width:calc(20% - 7px); }
      .sec-desc,.sec-dots { padding-left:0; }
      .egate { padding:36px 24px; }
      .res-num { font-size:64px; }
    }
  `;

  return (
    <div style={{fontFamily:"'Source Serif 4', Georgia, serif", background:"#FAFAF7", color:"#1A1A1A", minHeight:"100vh"}}>
      <style>{styles}</style>

      {/* Top bar */}
      <nav className="topbar">
        <a href="https://whyandhow.in" className="logo">Why <b>and</b> How</a>
        <span className="meta">
          {phase === "audit" ? `${totalAnswered} of ${TOTAL_QUESTIONS}` :
           phase === "results" ? "Audit Complete" : "OpEx360"}
        </span>
      </nav>
      {phase === "audit" && (
        <div className="pbar"><div className="pfill" style={{width:`${progressPct}%`}} /></div>
      )}

      {/* ── INTRO ── */}
      {phase === "intro" && (
        <div className={`wrap ${fadeIn ? "vis" : ""}`} style={{textAlign:"center"}}>
          <div className="badge">✦ Free Business Diagnostic</div>
          <h1 className="hero-t">
            Is your business ready to <em>scale</em><br/>
            or just growing <em>chaotically</em>?
          </h1>
          <p className="sub" style={{margin:"0 auto 36px"}}>
            28 focused questions. 7 business dimensions. Under 7 minutes.<br/>
            Get an honest picture of where you stand.
          </p>
          <div className="dims-row">
            {SECTIONS.map((s) => (
              <div key={s.id} className="dim-pill">
                <span className="ic" style={{color:s.color}}>{s.icon}</span>
                <h4>{s.title}</h4>
              </div>
            ))}
          </div>
          <div className="info-row">
            <span className="info-item">28 questions</span>
            <span className="info-item">~7 minutes</span>
            <span className="info-item">Personalised report</span>
            <span className="info-item">100% confidential</span>
          </div>
          <button className="btn btn-p" onClick={() => setPhase("profile")}>Start Your Audit →</button>
        </div>
      )}

      {/* ── PROFILE ── */}
      {phase === "profile" && (
        <div className={`wrap ${fadeIn ? "vis" : ""}`}>
          <div className="badge">Before We Begin</div>
          <h1 className="hero-t" style={{fontSize:30}}>Tell us about your business</h1>
          <p className="sub" style={{marginBottom:32}}>
            This helps us personalise your diagnostic. Fields marked * are required.
          </p>
          <div style={{display:"grid", gridTemplateColumns:"1fr 1fr", gap:"0 20px"}}>
            <div className="fg">
              <label className="fl">Your Name *</label>
              <input className="fi" placeholder="e.g. Rajesh Sharma"
                value={profile.name} onChange={(e) => setProfile({...profile, name:e.target.value})} />
            </div>
            <div className="fg">
              <label className="fl">Company Name *</label>
              <input className="fi" placeholder="e.g. Acme Industries"
                value={profile.company} onChange={(e) => setProfile({...profile, company:e.target.value})} />
            </div>
            <div className="fg">
              <label className="fl">Your Role</label>
              <input className="fi" placeholder="e.g. CEO, Founder, COO"
                value={profile.role} onChange={(e) => setProfile({...profile, role:e.target.value})} />
            </div>
            <div className="fg">
              <label className="fl">Years in Business</label>
              <input className="fi" placeholder="e.g. 5"
                value={profile.years} onChange={(e) => setProfile({...profile, years:e.target.value})} />
            </div>
          </div>
          <div className="fg">
            <label className="fl">Industry *</label>
            <div className="chips">
              {INDUSTRY_OPTIONS.map((ind) => (
                <button key={ind} className={`chip ${profile.industry === ind ? "on" : ""}`}
                  onClick={() => setProfile({...profile, industry:ind})}>{ind}</button>
              ))}
            </div>
          </div>
          <div className="fg">
            <label className="fl">Team Size *</label>
            <div className="chips">
              {["1-10","11-25","26-50","51-200","200+"].map((s) => (
                <button key={s} className={`chip ${profile.size === s ? "on" : ""}`}
                  onClick={() => setProfile({...profile, size:s})}>{s} people</button>
              ))}
            </div>
          </div>
          <div className="fg">
            <label className="fl">Annual Revenue *</label>
            <div className="chips">
              {["Under 1 Cr","1-5 Cr","5-25 Cr","25-100 Cr","100 Cr+"].map((r) => (
                <button key={r} className={`chip ${profile.revenue === r ? "on" : ""}`}
                  onClick={() => setProfile({...profile, revenue:r})}>{r}</button>
              ))}
            </div>
          </div>
          <div style={{display:"flex", gap:12, marginTop:32}}>
            <button className="btn btn-o" onClick={() => setPhase("intro")}>← Back</button>
            <button className="btn btn-p" disabled={!profileReady}
              onClick={() => setPhase("email-gate")}>
              Next →
            </button>
          </div>
        </div>
      )}

      {/* ── EMAIL GATE ── */}
      {phase === "email-gate" && (
        <div className={`wrap ${fadeIn ? "vis" : ""}`}>
          <div className="egate" style={{textAlign:"center"}}>
            <div className="egate-brand">OPEX360 BUSINESS AUDIT</div>
            <h2>
              {profile.name ? `Thanks, ${profile.name.split(" ")[0]}. ` : ""}
              Where should we send your report?
            </h2>
            <p className="egate-sub">
              You'll see your score the moment you finish. Your full diagnostic report —
              individual dimension scores and a prioritised action plan — will be in your
              inbox within 24 hours.
            </p>
            <div className="egate-pills">
              <span className="egate-pill">7 minutes</span>
              <span className="egate-pill">28 questions</span>
              <span className="egate-pill">7 dimensions</span>
              <span className="egate-pill">Free</span>
            </div>
            <div className="egate-divider" />
            <div className="gform">
              <div className="glabel">Email address <span className="greq">*</span></div>
              <input
                className={`ginp ${emailError ? "ginp-err" : ""}`}
                type="email"
                placeholder="you@company.com"
                value={profile.email}
                onChange={(e) => {
                  setProfile({...profile, email:e.target.value});
                  if (emailError) setEmailError("");
                }}
                onKeyDown={(e) => { if (e.key === "Enter") handleEmailGateNext(); }}
              />
              {emailError && <p className="gerr">{emailError}</p>}
              <div className="glabel">
                WhatsApp number
                <span style={{fontSize:11, color:"#3d5a7a", fontWeight:400}}>(optional — get the report here too)</span>
              </div>
              <input className="ginp" type="tel"
                placeholder="+91 98765 43210"
                value={profile.whatsapp}
                onChange={(e) => setProfile({...profile, whatsapp:e.target.value})}
                onKeyDown={(e) => { if (e.key === "Enter") handleEmailGateNext(); }}
              />
              <button className="egate-cta" onClick={handleEmailGateNext}>
                Start the audit →
              </button>
              <div className="egate-fine">No spam. No sales calls. Just your report.</div>
            </div>
          </div>
          <div style={{textAlign:"center", marginTop:16}}>
            <button className="btn btn-o" style={{fontSize:13, padding:"10px 20px"}}
              onClick={() => setPhase("profile")}>← Back</button>
          </div>
        </div>
      )}

      {/* ── AUDIT ── */}
      {phase === "audit" && section && (
        <div className={`wrap ${fadeIn ? "vis" : ""}`}>
          <div className="sec-hdr">
            <div className="sec-icon" style={{background:section.color+"15", color:section.color}}>
              {section.icon}
            </div>
            <div>
              <span className="meta" style={{marginBottom:3, display:"block"}}>
                Section {currentSec+1} of {SECTIONS.length}
              </span>
              <h2 style={{fontSize:24, fontWeight:400, fontFamily:"'Source Serif 4',serif"}}>
                {section.title}
              </h2>
            </div>
          </div>
          <p className="sec-desc">{section.desc}</p>
          <div className="sec-dots">
            {SECTIONS.map((s, i) => (
              <div key={s.id} className="dot" style={{
                width: i === currentSec ? 32 : 22,
                background: i === currentSec ? s.color : i < currentSec ? s.color+"60" : "#E0E0D8",
              }} onClick={() => { if (i <= currentSec || answeredInSection === section.questions.length) setCurrentSec(i); }} />
            ))}
          </div>
          {section.questions.map((q, qi) => (
            <div key={q.id} className="qcard">
              <p className="qtext">
                <span className="qnum" style={{color:section.color}}>
                  Q{SECTIONS.slice(0, currentSec).reduce((s, sec) => s + sec.questions.length, 0) + qi + 1}.
                </span>
                {q.text}
                {q.reverse && <span className="qrev">reverse scored</span>}
              </p>
              <div className="scale">
                {SCALE_OPTIONS.map((opt) => (
                  <button key={opt.value}
                    className={`sb ${answers[q.id] === opt.value ? "on" : ""}`}
                    style={answers[q.id] === opt.value ? {borderColor:section.color, background:section.color+"12"} : {}}
                    onClick={() => setAnswers({...answers, [q.id]:opt.value})}>
                    <span className="sv" style={answers[q.id] === opt.value ? {color:section.color} : {color:"#333"}}>
                      {opt.value}
                    </span>
                    <span className="sl">{opt.label}</span>
                  </button>
                ))}
              </div>
            </div>
          ))}
          <div className="sec-foot">
            <span className="sec-count">{answeredInSection}/{section.questions.length} answered</span>
            <div style={{display:"flex", gap:10}}>
              {currentSec > 0 && (
                <button className="btn btn-o" onClick={() => setCurrentSec(currentSec-1)}>← Previous</button>
              )}
              {currentSec < SECTIONS.length-1 ? (
                <button className="btn btn-p"
                  disabled={answeredInSection < section.questions.length}
                  onClick={() => setCurrentSec(currentSec+1)}>Next Section →</button>
              ) : (
                <button className="btn btn-g"
                  disabled={totalAnswered < TOTAL_QUESTIONS || submitting}
                  onClick={handleSubmitAudit}>
                  {submitting ? "Calculating..." : "Submit My Audit ✦"}
                </button>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ── RESULTS ── */}
      {phase === "results" && (() => {
        const top3 = getTop3Critical(sectionScores);
        return (
          <div className={`wrap ${fadeIn ? "vis" : ""}`} style={{maxWidth:640}}>

            {/* Score block */}
            <div className="res-score-block">
              <div className="res-brand">YOUR OPEX360 SCORE</div>
              <div>
                <span className="res-num">{overallScore}</span>
                <span className="res-denom">/100</span>
              </div>
              {maturity && (
                <div className="res-badge" style={{background:maturity.color+"22", color:maturity.color}}>
                  {maturity.label}
                </div>
              )}
              <div className="res-sub">Based on 28 responses across 7 dimensions</div>
            </div>

            {/* Top 3 critical */}
            <div className="critical-box">
              <div className="critical-title">3 DIMENSIONS NEED SERIOUS ATTENTION</div>
              <div className="critical-dims">
                {top3.map(d => (
                  <span key={d.id} className="critical-chip">{d.title}</span>
                ))}
              </div>
            </div>

            {/* Radar */}
            <div className="radar-block">
              <RadarChart scores={sectionScores} size={280} animated={true} />
            </div>

            {/* Report promise */}
            <div className="promise-box">
              <div className="promise-icon">✓</div>
              <h3>Your detailed report is on its way</h3>
              <p>
                Individual dimension scores, key patterns, and a prioritised
                action plan for your top 3 gaps — sent to{" "}
                <strong>{profile.email}</strong> within 24 hours.
              </p>
            </div>

            {/* WhatsApp add-on (if not provided upfront) */}
            {!profile.whatsapp && (
              <div className="wa-add-box">
                <div className="wa-add-label">Also want it on WhatsApp?</div>
                {waSubmitted ? (
                  <div className="wa-done">✓ Got it — we'll send it there too.</div>
                ) : (
                  <div className="wa-row">
                    <input className="wa-inp" type="tel"
                      placeholder="+91 98765 43210"
                      value={waOnResults}
                      onChange={(e) => setWaOnResults(e.target.value)}
                      onKeyDown={(e) => { if (e.key === "Enter") handleAddWhatsapp(); }}
                    />
                    <button className="wa-btn" onClick={handleAddWhatsapp}>Send on WhatsApp</button>
                  </div>
                )}
              </div>
            )}

            {/* CTAs */}
            <div style={{textAlign:"center", paddingTop:8, paddingBottom:24}}>
              <p style={{fontSize:14, color:"#999", marginBottom:16, fontWeight:300, fontFamily:"'DM Sans',sans-serif"}}>
                Want to discuss your results before the report arrives?
              </p>
              <button className="btn btn-p"
                onClick={() => window.open("https://calendar.app.google/4eY7DvKD5c8DmvWw6","_blank")}>
                Book a 30-Minute Conversation →
              </button>
            </div>

          </div>
        );
      })()}

    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById('root'));
root.render(<OpEx360 />);
</script>
</body>
</html>
