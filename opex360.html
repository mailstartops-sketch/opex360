<script type="text/babel">
const { useState, useEffect, useCallback } = React;

// ============================================================
// 7 SECTIONS × 4 QUESTIONS = 28 QUESTIONS
// ============================================================
const SECTIONS = [
  {
    id: "strategy", title: "Strategy & Direction", icon: "◇", color: "#C8A55C", weight: 0.12,
    desc: "Is there a clear plan driving the business — or is it running on instinct?",
    questions: [
      { id: "s1", text: "Do you have a clearly defined revenue target for the next 12 months?" },
      { id: "s2", text: "Is there a structured plan on how this revenue will be achieved?" },
      { id: "s3", text: "Are your decisions driven by data rather than intuition?" },
      { id: "s4", text: "Is your business strategy documented and understood by your team?" },
    ],
  },
  {
    id: "people", title: "Leadership & People", icon: "○", color: "#7BA08A", weight: 0.16,
    desc: "How strong is the leadership structure, team clarity, and accountability?",
    questions: [
      { id: "p1", text: "Do you have a clear leadership structure beyond the founder?" },
      { id: "p2", text: "Are roles, responsibilities, and outcomes clearly defined for all team members?" },
      { id: "p3", text: "Is your business heavily dependent on you (founder) for key decisions?", reverse: true },
      { id: "p4", text: "Are performance metrics (KPIs/KRAs) defined and reviewed for each role?" },
    ],
  },
  {
    id: "customer", title: "Customer & Market", icon: "◎", color: "#B5785A", weight: 0.12,
    desc: "How well do you understand who you serve and why they choose you?",
    questions: [
      { id: "c1", text: "Do you have clearly defined target customer segments?" },
      { id: "c2", text: "Is your value proposition clearly differentiated from competitors?" },
      { id: "c3", text: "Do you understand why customers choose you over others?" },
      { id: "c4", text: "Do you analyse lost deals or customer churn to improve positioning?" },
    ],
  },
  {
    id: "sales", title: "Sales & Revenue Engine", icon: "▲", color: "#C25550", weight: 0.16,
    desc: "Can you generate revenue predictably — or does it depend on individual effort?",
    questions: [
      { id: "se1", text: "Do you have a consistent and predictable lead generation process?" },
      { id: "se2", text: "Is your sales pipeline visible and tracked at any point in time?" },
      { id: "se3", text: "Are follow-ups tracked and monitored systematically?" },
      { id: "se4", text: "Is sales dependent on specific individuals rather than a system?", reverse: true },
    ],
  },
  {
    id: "operations", title: "Operations & Delivery", icon: "□", color: "#C4897A", weight: 0.16,
    desc: "Can your business execute consistently — or does quality depend on who's involved?",
    questions: [
      { id: "o1", text: "Are your key business processes documented (SOPs)?" },
      { id: "o2", text: "Do you track turnaround time (TAT) for delivery or service?" },
      { id: "o3", text: "Do you face recurring operational issues or rework?", reverse: true },
      { id: "o4", text: "Is there a clear handoff process between sales and service/delivery teams?" },
    ],
  },
  {
    id: "finance", title: "Financial Discipline", icon: "◆", color: "#6B8F71", weight: 0.14,
    desc: "Do you have real visibility into your financial health and pricing strength?",
    questions: [
      { id: "f1", text: "Do you track monthly revenue, costs, and profitability clearly?" },
      { id: "f2", text: "Do you know your profit margins by product or service?" },
      { id: "f3", text: "Do you actively manage cash flow — collections, payments, and timing?" },
      { id: "f4", text: "Are your pricing decisions based on structured costing and market data?" },
    ],
  },
  {
    id: "scale", title: "Systems & Scale Readiness", icon: "⬡", color: "#9B8EC4", weight: 0.14,
    desc: "Can this business grow beyond its current form — or is it stuck at the founder?",
    questions: [
      { id: "sc1", text: "Do you use a CRM or structured system to manage customers and leads?" },
      { id: "sc2", text: "Do you have real-time visibility of business metrics (dashboards or reports)?" },
      { id: "sc3", text: "Do you rely on individuals for knowledge rather than documented systems?", reverse: true },
      { id: "sc4", text: "Can your business run smoothly for 2–3 weeks without your direct involvement?" },
    ],
  },
];

const TOTAL_QUESTIONS = SECTIONS.reduce((s, sec) => s + sec.questions.length, 0);

const INDUSTRY_OPTIONS = [
  "Manufacturing", "Professional Services", "IT / SaaS / Tech",
  "Retail / E-commerce", "Trading / Distribution", "Healthcare",
  "Financial Services", "Education", "Hospitality",
  "Logistics / Supply Chain", "Real Estate", "Other",
];

const SCALE_OPTIONS = [
  { value: 1, label: "Not at all" },
  { value: 2, label: "Rarely" },
  { value: 3, label: "Partially" },
  { value: 4, label: "Mostly" },
  { value: 5, label: "Fully" },
];

const MATURITY_BANDS = [
  { min: 80, label: "Strong Foundation", color: "#6B8F71", desc: "Your business has several core building blocks in place." },
  { min: 65, label: "Growing with Friction", color: "#C8A55C", desc: "There is momentum, but internal gaps may be slowing execution or limiting scale." },
  { min: 50, label: "Operational Strain", color: "#C4897A", desc: "Gaps in structure, accountability, or systems are likely creating strain and hidden risk." },
  { min: 0, label: "High Structural Risk", color: "#C25550", desc: "The business may be heavily vulnerable to founder dependency, inconsistent execution, or weak control." },
];

// ============================================================
// PATTERN DETECTION
// ============================================================
const detectPatterns = (secScores, answers) => {
  const patterns = [];
  if ((answers.p3 || 0) >= 4 || (secScores.people < 55 && secScores.scale < 55))
    patterns.push({ id: "founder_dep", title: "Founder Dependency Risk", severity: "high" });
  if (secScores.sales < 55 && secScores.customer >= 45)
    patterns.push({ id: "weak_sales", title: "Unstructured Revenue Engine", severity: "high" });
  if (secScores.sales >= 65 && secScores.operations < 55)
    patterns.push({ id: "sales_ops", title: "Sales-Operations Mismatch", severity: "medium" });
  if (secScores.operations >= 65 && secScores.customer < 55 && secScores.sales < 60)
    patterns.push({ id: "no_market", title: "Capability Without Market Clarity", severity: "medium" });
  if (secScores.finance < 55)
    patterns.push({ id: "weak_finance", title: "Financial Visibility Gap", severity: "high" });
  if (secScores.scale < 50 && ((answers.p3 || 0) >= 3 || secScores.people < 55))
    patterns.push({ id: "scale_risk", title: "Scale Readiness Concern", severity: "high" });
  if (secScores.scale < 55 && ((answers.sc3 || 0) >= 4 || secScores.operations < 55))
    patterns.push({ id: "knowledge_trap", title: "Knowledge Locked in Individuals", severity: "medium" });
  return patterns;
};

// ============================================================
// RADAR CHART
// ============================================================
const RadarChart = ({ scores, size = 340, animated = false }) => {
  const [progress, setProgress] = useState(animated ? 0 : 1);
  const center = size / 2;
  const radius = size * 0.34;
  const dims = SECTIONS.length;
  useEffect(() => {
    if (!animated) return;
    let start = null;
    const animate = (ts) => {
      if (!start) start = ts;
      const p = Math.min((ts - start) / 1400, 1);
      setProgress(p * p * (3 - 2 * p));
      if (p < 1) requestAnimationFrame(animate);
    };
    const t = setTimeout(() => requestAnimationFrame(animate), 500);
    return () => clearTimeout(t);
  }, [animated]);
  const getPoint = (index, value) => {
    const angle = (Math.PI * 2 * index) / dims - Math.PI / 2;
    const r = (value / 100) * radius * progress;
    return { x: center + r * Math.cos(angle), y: center + r * Math.sin(angle) };
  };
  return (
    <svg width={size} height={size} viewBox={`0 0 ${size} ${size}`}>
      {[20, 40, 60, 80, 100].map((level) => {
        const pts = Array.from({ length: dims }, (_, i) => {
          const a = (Math.PI * 2 * i) / dims - Math.PI / 2;
          const r = (level / 100) * radius;
          return `${center + r * Math.cos(a)},${center + r * Math.sin(a)}`;
        }).join(" ");
        return <polygon key={level} points={pts} fill="none" stroke={level === 100 ? "rgba(200,165,92,0.2)" : "rgba(0,0,0,0.04)"} strokeWidth={level === 100 ? 1.5 : 0.7} />;
      })}
      {SECTIONS.map((_, i) => {
        const a = (Math.PI * 2 * i) / dims - Math.PI / 2;
        return <line key={i} x1={center} y1={center} x2={center + radius * Math.cos(a)} y2={center + radius * Math.sin(a)} stroke="rgba(0,0,0,0.06)" strokeWidth="0.7" />;
      })}
      <polygon
        points={SECTIONS.map((s, i) => { const pt = getPoint(i, scores[s.id] || 0); return `${pt.x},${pt.y}`; }).join(" ")}
        fill="rgba(200,165,92,0.12)" stroke="#C8A55C" strokeWidth="2.5"
      />
      {SECTIONS.map((s, i) => {
        const pt = getPoint(i, scores[s.id] || 0);
        return <circle key={s.id} cx={pt.x} cy={pt.y} r="5" fill={s.color} stroke="#fff" strokeWidth="2" />;
      })}
      {SECTIONS.map((s, i) => {
        const a = (Math.PI * 2 * i) / dims - Math.PI / 2;
        const lr = radius + 32;
        const x = center + lr * Math.cos(a);
        const y = center + lr * Math.sin(a);
        const anchor = Math.abs(Math.cos(a)) < 0.15 ? "middle" : Math.cos(a) > 0 ? "start" : "end";
        const words = s.title.split(" ");
        const mid = Math.ceil(words.length / 2);
        const lines = [words.slice(0, mid).join(" "), words.slice(mid).join(" ")].filter(Boolean);
        return (
          <g key={s.id}>
            {lines.map((line, li) => (
              <text key={li} x={x} y={y + li * 13 - (lines.length - 1) * 6} textAnchor={anchor} dominantBaseline="middle"
                style={{ fontFamily: "'DM Sans', sans-serif", fontSize: 10, fontWeight: 600, fill: s.color }}>
                {line}
              </text>
            ))}
          </g>
        );
      })}
    </svg>
  );
};

// ============================================================
// STATIC OBSERVATION (no API needed — AI call fails gracefully)
// ============================================================
const generateObservation = (profile, secScores, overall, band, patterns) => {
  const sorted = Object.entries(secScores).sort(([, a], [, b]) => a - b);
  const weakest = sorted.slice(0, 3).map(([id]) => SECTIONS.find((s) => s.id === id));
  const strongest = sorted.slice(-2).reverse().map(([id]) => SECTIONS.find((s) => s.id === id));
  return {
    observation: `${profile.company || "The business"} scores ${overall}/100 overall — placing it in the "${band.label}" category. There are relative strengths in ${strongest[0]?.title}, but scores in ${weakest[0]?.title} and ${weakest[1]?.title} suggest friction points that may be compounding beneath the surface. The shape of the radar suggests this isn't about isolated weaknesses — there may be a connecting thread worth a deeper look.`,
    strongest_note: `${strongest[0]?.title} at ${Math.round(secScores[strongest[0]?.id])}/100 is a relative strength worth protecting and building on.`,
    concern_note: `${weakest[0]?.title} at ${Math.round(secScores[weakest[0]?.id])}/100 is where the most visible strain appears.`,
    pattern_summary: patterns.length > 0
      ? `The combination of ${patterns.slice(0, 2).map((p) => p.title.toLowerCase()).join(" and ")} often points to a deeper structural issue that individual fixes won't resolve.`
      : "Multiple dimensions scoring below 60 usually signals a structural challenge, not just operational gaps.",
  };
};

// ============================================================
// MAIN COMPONENT
// ============================================================
const OpEx360 = () => {
  const [phase, setPhase] = useState("intro");
  const [profile, setProfile] = useState({ name: "", company: "", email: "", phone: "", role: "", industry: "", size: "", revenue: "", years: "" });
  const [profileErrors, setProfileErrors] = useState({});
  const [currentSec, setCurrentSec] = useState(0);
  const [answers, setAnswers] = useState({});
  const [sectionScores, setSectionScores] = useState({});
  const [overallScore, setOverallScore] = useState(0);
  const [patterns, setPatterns] = useState([]);
  const [maturity, setMaturity] = useState(null);
  const [observation, setObservation] = useState(null);
  const [emailSubmitted, setEmailSubmitted] = useState(false);
  const [submitting, setSubmitting] = useState(false);
  const [submitError, setSubmitError] = useState(false);
  const [fadeIn, setFadeIn] = useState(false);

  useEffect(() => {
    setFadeIn(false);
    const t = setTimeout(() => setFadeIn(true), 60);
    return () => clearTimeout(t);
  }, [phase, currentSec]);

  const section = SECTIONS[currentSec];
  const answeredInSection = section ? section.questions.filter((q) => answers[q.id] !== undefined).length : 0;
  const totalAnswered = Object.keys(answers).length;
  const progress = (totalAnswered / TOTAL_QUESTIONS) * 100;

  const validateProfile = () => {
    const errs = {};
    if (!profile.name.trim()) errs.name = "Required";
    if (!profile.company.trim()) errs.company = "Required";
    if (!profile.role.trim()) errs.role = "Required";
    if (!profile.years.trim()) errs.years = "Required";
    if (!profile.email.trim()) errs.email = "Required";
    else if (!profile.email.includes("@")) errs.email = "Enter a valid email";
    setProfileErrors(errs);
    return Object.keys(errs).length === 0;
  };

  const handleBeginAssessment = () => {
    if (!validateProfile()) return;
    setCurrentSec(0);
    setPhase("audit");
  };

  const calculateAll = useCallback(() => {
    const secScores = {};
    SECTIONS.forEach((sec) => {
      const vals = sec.questions.map((q) => {
        const raw = answers[q.id] || 0;
        if (raw === 0) return 0;
        return q.reverse ? 6 - raw : raw;
      }).filter((v) => v > 0);
      secScores[sec.id] = vals.length > 0 ? ((vals.reduce((a, b) => a + b, 0) / (vals.length * 5)) * 100) : 0;
    });
    const weightedTotal = SECTIONS.reduce((sum, sec) => sum + secScores[sec.id] * sec.weight, 0);
    const totalWeight = SECTIONS.reduce((sum, sec) => sum + sec.weight, 0);
    const overall = Math.round(weightedTotal / totalWeight);
    const band = MATURITY_BANDS.find((b) => overall >= b.min);
    const pats = detectPatterns(secScores, answers);
    setSectionScores(secScores);
    setOverallScore(overall);
    setMaturity(band);
    setPatterns(pats);
    return { secScores, overall, band, pats };
  }, [answers]);

  const handleFinish = () => {
    const data = calculateAll();
    setPhase("analyzing");
    const obs = generateObservation(profile, data.secScores, data.overall, data.band, data.pats);
    setObservation(obs);
    setTimeout(() => setPhase("results"), 1600);
  };

  const submitToFormspree = async () => {
    setSubmitting(true);
    setSubmitError(false);
    const sorted = Object.entries(sectionScores).sort(([, a], [, b]) => a - b);
    const weakest3 = sorted.slice(0, 3).map(([id]) => SECTIONS.find((s) => s.id === id));
    try {
      const res = await fetch("https://formspree.io/f/xqeoglwe", {
        method: "POST",
        headers: { "Content-Type": "application/json", "Accept": "application/json" },
        body: JSON.stringify({
          name: profile.name,
          email: profile.email,
          phone: profile.phone || "(not provided)",
          company: profile.company,
          role: profile.role,
          industry: profile.industry || "(not provided)",
          team_size: profile.size || "(not provided)",
          annual_revenue: profile.revenue || "(not provided)",
          years_in_business: profile.years,
          overall_score: `${overallScore}/100`,
          maturity_band: maturity?.label || "",
          top_weak_areas: weakest3.map((s) => `${s?.title}: ${Math.round(sectionScores[s?.id] || 0)}/100`).join(" | "),
          patterns_detected: patterns.map((p) => p.title).join(", ") || "None",
          section_scores: SECTIONS.map((s) => `${s.title}: ${Math.round(sectionScores[s.id] || 0)}`).join(" | "),
          _subject: `OpEx360 Lead: ${profile.company} (${profile.name}) — ${overallScore}/100`,
        }),
      });
      if (res.ok) {
        setEmailSubmitted(true);
      } else {
        setSubmitError(true);
      }
    } catch (e) {
      setSubmitError(true);
    }
    setSubmitting(false);
  };

  const scoreColor = (s) => s >= 75 ? "#6B8F71" : s >= 60 ? "#C8A55C" : s >= 45 ? "#C4897A" : "#C25550";

  const inp = (field, placeholder, type = "text") => (
    <div className="fg">
      <label className="fl">
        {field === "name" ? "Your Name" : field === "company" ? "Company Name" : field === "role" ? "Your Role" : field === "years" ? "Years in Business" : "Email Address"}
        <span style={{ color: "#C25550", marginLeft: 3 }}>*</span>
      </label>
      <input
        className={`fi ${profileErrors[field] ? "fi-err" : ""}`}
        type={type}
        placeholder={placeholder}
        value={profile[field]}
        onChange={(e) => {
          setProfile({ ...profile, [field]: e.target.value });
          if (profileErrors[field]) setProfileErrors({ ...profileErrors, [field]: "" });
        }}
      />
      {profileErrors[field] && <span className="err-msg">{profileErrors[field]}</span>}
    </div>
  );

  const styles = `
    @import url('https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Source+Serif+4:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap');
    * { margin:0; padding:0; box-sizing:border-box; }
    ::selection { background:#C8A55C; color:#fff; }
    body { background:#FAFAF7; }
    .wrap { max-width:860px; margin:0 auto; padding:96px 32px 80px; opacity:0; transform:translateY(16px); transition:all .5s cubic-bezier(.4,0,.2,1); }
    .wrap.vis { opacity:1; transform:translateY(0); }
    .topbar { position:fixed; top:0; left:0; right:0; z-index:100; height:58px; background:rgba(250,250,247,.96); backdrop-filter:blur(20px); border-bottom:1px solid rgba(0,0,0,.06); display:flex; align-items:center; justify-content:space-between; padding:0 40px; }
    .logo { font-family:'DM Sans',sans-serif; font-weight:700; font-size:18px; color:#1A1A1A; line-height:1; }
    .logo b { color:#C8A55C; }
    .logo span { font-weight:400; font-size:13px; color:#999; margin-left:4px; }
    .pbar { position:fixed; top:58px; left:0; right:0; height:3px; background:#EEEEE8; z-index:99; }
    .pfill { height:100%; background:linear-gradient(90deg,#C8A55C,#7BA08A); transition:width .6s cubic-bezier(.4,0,.2,1); border-radius:0 2px 2px 0; }
    .meta { font-family:'DM Sans',sans-serif; font-size:12px; font-weight:600; color:#999; }
    .badge { display:inline-flex; align-items:center; gap:8px; font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700; letter-spacing:2.5px; text-transform:uppercase; color:#C8A55C; background:rgba(200,165,92,.08); padding:8px 20px; border-radius:100px; margin-bottom:28px; }
    h1.hero-t { font-size:clamp(32px,5vw,50px); font-weight:300; line-height:1.14; letter-spacing:-1px; margin-bottom:20px; font-family:'Source Serif 4',serif; }
    h1.hero-t em { font-style:italic; color:#C8A55C; font-weight:400; }

    .btn-p:hover { background:#333; transform:translateY(-1px); }

    .sec-dots { display:flex; gap:6px; margin-bottom:36px; padding-left:58px; }
    .dot { height:6px; border-radius:3px; cursor:pointer; transition:all .25s; }
    .qcard { background:#fff; border:1px solid #EEEEE8; border-radius:11px; padding:24px 28px; margin-bottom:14px; transition:all .25s; }
    .qcard:hover { border-color:#D8D8D0; }
    .qtext { font-size:15.5px; line-height:1.6; margin-bottom:18px; color:#333; font-weight:400; font-family:'Source Serif 4',serif; }
    .qnum { font-family:'DM Sans',sans-serif; font-weight:700; margin-right:8px; }
    .qrev { font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600; background:rgba(194,85,80,.08); color:#C25550; padding:3px 10px; border-radius:100px; margin-left:8px; vertical-align:middle; }
    .scale { display:flex; gap:7px; }
    .sb { flex:1; padding:10px 4px; border:1.5px solid #E8E8E0; border-radius:8px; background:#fff; cursor:pointer; transition:all .2s; text-align:center; font-family:'DM Sans',sans-serif; }
    .sb:hover { border-color:#C8A55C; background:rgba(200,165,92,.03); }
    .sb.on { border-color:#C8A55C; background:rgba(200,165,92,.1); }
    .sv { font-size:18px; font-weight:700; display:block; margin-bottom:2px; }
    .sl { font-size:9px; color:#999; font-weight:500; letter-spacing:.3px; }
    .sec-foot { display:flex; justify-content:space-between; align-items:center; margin-top:28px; padding-top:20px; border-top:1px solid #EEEEE8; }
    .sec-count { font-family:'DM Sans',sans-serif; font-size:13px; color:#999; }
    .spinner { width:52px; height:52px; border:3px solid #EEEEE8; border-top-color:#C8A55C; border-radius:50%; animation:spin .8s linear infinite; margin:0 auto 28px; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .rcard { background:#fff; border:1px solid #EEEEE8; border-radius:13px; padding:28px 30px; margin-bottom:20px; }
    .rcard h3 { font-family:'DM Sans',sans-serif; font-size:11px; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:#C8A55C; margin-bottom:12px; }
    .rtxt { font-size:16px; color:#444; line-height:1.75; font-weight:300; font-family:'Source Serif 4',serif; }
    .drow { display:flex; align-items:center; gap:14px; padding:14px 0; border-bottom:1px solid #F4F4EE; }
    .drow:last-child { border-bottom:none; }
    .dic { width:34px; height:34px; border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:15px; flex-shrink:0; }
    .dinf { flex:1; }
    .dnam { font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; color:#1A1A1A; }
    .dbar { height:5px; background:#F0F0EA; border-radius:3px; margin-top:6px; overflow:hidden; }
    .dfill { height:100%; border-radius:3px; transition:width 1.2s ease; }
    .dval { font-family:'DM Sans',sans-serif; font-size:18px; font-weight:700; min-width:40px; text-align:right; }
    .dbadge { font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600; padding:3px 10px; border-radius:100px; margin-left:8px; }
    .pat-row { display:flex; align-items:center; gap:12px; padding:12px 0; border-bottom:1px solid #F4F4EE; }
    .pat-row:last-child { border-bottom:none; }
    .pat-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
    .pat-title { font-family:'DM Sans',sans-serif; font-size:14px; font-weight:600; color:#1A1A1A; }
    .pat-sev { font-family:'DM Sans',sans-serif; font-size:10px; font-weight:600; padding:3px 10px; border-radius:100px; margin-left:auto; }
    .gate { background:linear-gradient(135deg,#1A1A1A,#2A2A2A); border-radius:14px; padding:48px; text-align:center; color:#FAFAF7; margin:36px 0; }
    .gate h2 { font-size:28px; font-weight:400; margin-bottom:12px; letter-spacing:-.3px; font-family:'Source Serif 4',serif; }
    .gate h2 em { color:#C8A55C; font-style:italic; }
    .gate > p { font-size:15px; color:#999; margin-bottom:28px; line-height:1.7; font-weight:300; max-width:480px; margin-left:auto; margin-right:auto; }
    .gfeats { display:flex; justify-content:center; gap:28px; margin-bottom:28px; flex-wrap:wrap; }
    .gfeat { font-family:'DM Sans',sans-serif; font-size:12px; color:#888; display:flex; align-items:center; gap:6px; }
    .gfeat b { color:#C8A55C; font-weight:400; }
    .gform { max-width:480px; margin:0 auto; }
    .ginp { width:100%; padding:13px 16px; border:1.5px solid rgba(255,255,255,.12); border-radius:8px; background:rgba(255,255,255,.06); font-family:'DM Sans',sans-serif; font-size:14px; color:#FAFAF7; outline:none; transition:border-color .2s; margin-bottom:10px; }
    .ginp:focus { border-color:#C8A55C; }
    .ginp::placeholder { color:#555; }
    .ginp-pre { background:rgba(255,255,255,.04); color:#AAA; cursor:default; }
    .gsuccess { background:rgba(123,160,138,.1); border:1px solid rgba(123,160,138,.3); border-radius:10px; padding:28px; margin-top:4px; }
    .gsuccess h3 { font-family:'DM Sans',sans-serif; font-size:15px; font-weight:700; color:#7BA08A; margin-bottom:8px; }
    .gsuccess p { font-family:'DM Sans',sans-serif; font-size:14px; color:#7BA08A; font-weight:400; line-height:1.6; }
    .cta-end { text-align:center; padding:48px 0; border-top:1px solid #EEEEE8; margin-top:44px; }
    .cta-end h3 { font-size:24px; font-weight:400; margin-bottom:10px; letter-spacing:-.3px; font-family:'Source Serif 4',serif; }
    .cta-end p { font-size:15px; color:#666; margin-bottom:24px; font-weight:300; max-width:460px; margin-left:auto; margin-right:auto; line-height:1.7; }
    @media(max-width:700px) {
      .topbar { padding:0 18px; }
      .wrap { padding:82px 18px 60px; }
      .dims-row { grid-template-columns:repeat(2,1fr); }
      .scale { flex-wrap:wrap; }
      .sb { min-width:calc(20% - 7px); }
      .sec-desc,.sec-dots { padding-left:0; }
      .gfeats { flex-direction:column; align-items:center; gap:10px; }
      .gate { padding:36px 24px; }
      .grid2 { grid-template-columns:1fr !important; }
    }
  `;

  return (
    <div style={{ fontFamily: "'Source Serif 4', Georgia, serif", background: "#FAFAF7", color: "#1A1A1A", minHeight: "100vh" }}>
      <style>{styles}</style>
      <nav className="topbar">
        <a href="https://whyandhow.in" className="logo" style={{textDecoration:"none",color:"inherit"}}>Why<b>&</b>How<span>Advisory</span></a>
        <span className="meta">
          {phase === "audit" ? `${totalAnswered} of ${TOTAL_QUESTIONS}` : phase === "results" ? "Audit Complete" : "OpEx360"}
        </span>
      </nav>
      {phase === "audit" && <div className="pbar"><div className="pfill" style={{ width: `${progress}%` }} /></div>}

      {/* ───── INTRO ───── */}
      {phase === "intro" && (
        <div className={`wrap ${fadeIn ? "vis" : ""}`} style={{ textAlign: "center" }}>
          <div className="badge">✦ Free Business Diagnostic</div>
          <h1 className="hero-t">Is your business ready to <em>scale</em><br />or just growing <em>chaotically</em>?</h1>
          <p className="sub" style={{ margin: "0 auto 36px" }}>
            28 focused questions. 7 business dimensions. Under 7 minutes.<br />
            Get an honest picture of where you stand.
          </p>
          <div className="dims-row">
            {SECTIONS.map((s) => (
              <div key={s.id} className="dim-pill">
                <span className="ic" style={{ color: s.color }}>{s.icon}</span>
                <h4>{s.title}</h4>
              </div>
            ))}
          </div>
          <div className="info-row">
            <span className="info-item">28 questions</span>
            <span className="info-item">~7 minutes</span>
            <span className="info-item">Instant scorecard</span>
            <span className="info-item">100% confidential</span>
          </div>
          <button className="btn btn-p" onClick={() => setPhase("profile")}>Start Your Audit →</button>
        </div>
      )}

      {/* ───── PROFILE ───── */}
      {phase === "profile" && (
        <div className={`wrap ${fadeIn ? "vis" : ""}`}>
          <div className="badge">Before We Begin</div>
          <h1 className="hero-t" style={{ fontSize: 30 }}>Tell us about your business</h1>
          <p className="sub" style={{ marginBottom: 8 }}>This personalises your diagnostic report and helps us prepare for your call.</p>
          <p className="req-note"><span>*</span> Required fields</p>

          <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: "0 20px" }} className="grid2">
            {inp("name", "e.g. Rajesh Sharma")}
            {inp("company", "e.g. Acme Industries")}
            {inp("role", "e.g. CEO, Founder, COO")}
            {inp("years", "e.g. 5")}
          </div>
          {inp("email", "your@email.com", "email")}

          <div className="divider" />

          <div className="fg">
            <label className="fl">Industry <span style={{ fontWeight: 400, color: "#999" }}>(optional)</span></label>
            <div className="chips">
              {INDUSTRY_OPTIONS.map((ind) => (
                <button key={ind} className={`chip ${profile.industry === ind ? "on" : ""}`} onClick={() => setProfile({ ...profile, industry: ind })}>{ind}</button>
              ))}
            </div>
          </div>
          <div className="fg">
            <label className="fl">Team Size <span style={{ fontWeight: 400, color: "#999" }}>(optional)</span></label>
            <div className="chips">
              {["1-10", "11-25", "26-50", "51-200", "200+"].map((s) => (
                <button key={s} className={`chip ${profile.size === s ? "on" : ""}`} onClick={() => setProfile({ ...profile, size: s })}>{s} people</button>
              ))}
            </div>
          </div>
          <div className="fg">
            <label className="fl">Annual Revenue <span style={{ fontWeight: 400, color: "#999" }}>(optional)</span></label>
            <div className="chips">
              {["Under 1 Cr", "1-5 Cr", "5-25 Cr", "25-100 Cr", "100 Cr+"].map((r) => (
                <button key={r} className={`chip ${profile.revenue === r ? "on" : ""}`} onClick={() => setProfile({ ...profile, revenue: r })}>{r}</button>
              ))}
            </div>
          </div>
          <div style={{ display: "flex", gap: 12, marginTop: 32 }}>
            <button className="btn btn-o" onClick={() => setPhase("intro")}>← Back</button>
            <button className="btn btn-p" onClick={handleBeginAssessment}>Begin Assessment →</button>
          </div>
        </div>
      )}

      {/* ───── AUDIT ───── */}
      {phase === "audit" && section && (
        <div className={`wrap ${fadeIn ? "vis" : ""}`}>
          <div className="sec-hdr">
            <div className="sec-icon" style={{ background: section.color + "15", color: section.color }}>{section.icon}</div>
            <div>
              <span className="meta" style={{ marginBottom: 3, display: "block" }}>Section {currentSec + 1} of {SECTIONS.length}</span>
              <h2 style={{ fontSize: 24, fontWeight: 400, fontFamily: "'Source Serif 4',serif" }}>{section.title}</h2>
            </div>
          </div>
          <p className="sec-desc">{section.desc}</p>
          <div className="sec-dots">
            {SECTIONS.map((s, i) => (
              <div key={s.id} className="dot" style={{
                width: i === currentSec ? 32 : 22,
                background: i === currentSec ? s.color : i < currentSec ? s.color + "60" : "#E0E0D8",
              }} onClick={() => { if (i <= currentSec || answeredInSection === section.questions.length) setCurrentSec(i); }} />
            ))}
          </div>
          {section.questions.map((q, qi) => (
            <div key={q.id} className="qcard">
              <p className="qtext">
                <span className="qnum" style={{ color: section.color }}>Q{SECTIONS.slice(0, currentSec).reduce((s, sec) => s + sec.questions.length, 0) + qi + 1}.</span>
                {q.text}
                {q.reverse && <span className="qrev">reverse scored</span>}
              </p>
              <div className="scale">
                {SCALE_OPTIONS.map((opt) => (
                  <button key={opt.value}
                    className={`sb ${answers[q.id] === opt.value ? "on" : ""}`}
                    style={answers[q.id] === opt.value ? { borderColor: section.color, background: section.color + "12" } : {}}
                    onClick={() => setAnswers({ ...answers, [q.id]: opt.value })}>
                    <span className="sv" style={answers[q.id] === opt.value ? { color: section.color } : { color: "#333" }}>{opt.value}</span>
                    <span className="sl">{opt.label}</span>
                  </button>
                ))}
              </div>
            </div>
          ))}
          <div className="sec-foot">
            <span className="sec-count">{answeredInSection}/{section.questions.length} answered</span>
            <div style={{ display: "flex", gap: 10 }}>
              {currentSec > 0 && <button className="btn btn-o" onClick={() => setCurrentSec(currentSec - 1)}>← Previous</button>}
              {currentSec < SECTIONS.length - 1 ? (
                <button className="btn btn-p" disabled={answeredInSection < section.questions.length}
                  onClick={() => setCurrentSec(currentSec + 1)}>Next Section →</button>
              ) : (
                <button className="btn btn-g" disabled={totalAnswered < TOTAL_QUESTIONS}
                  onClick={handleFinish}>Generate My Scorecard ✦</button>
              )}
            </div>
          </div>
        </div>
      )}

      {/* ───── ANALYZING ───── */}
      {phase === "analyzing" && (
        <div className={`wrap ${fadeIn ? "vis" : ""}`} style={{ textAlign: "center", paddingTop: 180 }}>
          <div className="spinner" />
          <h2 style={{ fontSize: 26, fontWeight: 300, marginBottom: 10 }}>Analysing your responses...</h2>
          <p style={{ fontSize: 15, color: "#888", fontWeight: 300 }}>Scoring across {SECTIONS.length} dimensions.</p>
        </div>
      )}

      {/* ───── RESULTS ───── */}
      {phase === "results" && (
        <div className={`wrap ${fadeIn ? "vis" : ""}`}>

          {/* Overall Score */}
          <div style={{ textAlign: "center", marginBottom: 44 }}>
            <div className="badge">OpEx360 Business Health Score</div>
            <h1 className="hero-t" style={{ fontSize: 26, marginBottom: 16 }}>{profile.company || "Your Business"}</h1>
            <div style={{ fontFamily: "'DM Sans',sans-serif", display: "inline-flex", alignItems: "baseline", gap: 6 }}>
              <span style={{ fontSize: 64, fontWeight: 700, color: scoreColor(overallScore), letterSpacing: -2 }}>{overallScore}</span>
              <span style={{ fontSize: 22, color: "#999" }}>/100</span>
            </div>
            <br />
            {maturity && (
              <>
                <span style={{ display: "inline-block", padding: "6px 18px", borderRadius: 100, fontFamily: "'DM Sans',sans-serif", fontSize: 13, fontWeight: 600, marginTop: 10, background: maturity.color + "15", color: maturity.color }}>{maturity.label}</span>
                <p style={{ fontSize: 15, color: "#777", marginTop: 12, fontWeight: 300, maxWidth: 500, margin: "12px auto 0" }}>{maturity.desc}</p>
              </>
            )}
          </div>

          {/* Radar */}
          <div style={{ display: "flex", justifyContent: "center", margin: "0 0 44px" }}>
            <RadarChart scores={sectionScores} size={360} animated={true} />
          </div>

          {/* Observation */}
          {observation && (
            <div className="rcard">
              <h3>Consultant's Observation</h3>
              <p className="rtxt">{observation.observation}</p>
            </div>
          )}

          {/* Dimension Scores */}
          <div className="rcard">
            <h3>Dimension Scores</h3>
            {SECTIONS.map((s) => {
              const sc = Math.round(sectionScores[s.id] || 0);
              return (
                <div key={s.id} className="drow">
                  <div className="dic" style={{ background: s.color + "15", color: s.color }}>{s.icon}</div>
                  <div className="dinf">
                    <div className="dnam">
                      {s.title}
                      <span className="dbadge" style={{ background: scoreColor(sc) + "15", color: scoreColor(sc) }}>
                        {sc >= 75 ? "Strong" : sc >= 60 ? "Okay" : sc >= 45 ? "Weak" : "Critical"}
                      </span>
                    </div>
                    <div className="dbar"><div className="dfill" style={{ width: `${sc}%`, background: s.color }} /></div>
                  </div>
                  <div className="dval" style={{ color: scoreColor(sc) }}>{sc}</div>
                </div>
              );
            })}
          </div>

          {/* Patterns */}
          {patterns.length > 0 && (
            <div className="rcard">
              <h3>Patterns Detected</h3>
              <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 13, color: "#999", marginBottom: 16 }}>
                Our diagnostic flagged the following patterns in your responses.
              </p>
              {patterns.map((p) => (
                <div key={p.id} className="pat-row">
                  <div className="pat-dot" style={{ background: p.severity === "high" ? "#C25550" : "#C8A55C" }} />
                  <span className="pat-title">{p.title}</span>
                  <span className="pat-sev" style={{
                    background: p.severity === "high" ? "rgba(194,85,80,.08)" : "rgba(200,165,92,.08)",
                    color: p.severity === "high" ? "#C25550" : "#C8A55C",
                  }}>{p.severity}</span>
                </div>
              ))}
            </div>
          )}

          {/* Teaser */}
          {observation && (
            <div className="rcard" style={{ background: "rgba(200,165,92,.04)", borderColor: "rgba(200,165,92,.15)" }}>
              <h3>Something Worth Investigating</h3>
              <p className="rtxt">{observation.pattern_summary}</p>
            </div>
          )}

          {/* Email Gate — book a call */}
          <div className="gate">
            <h2>Want to <em>discuss your results</em>?</h2>
            <p>Book a free 45-minute diagnostic call with Why & How Advisory. We'll walk through your scorecard, validate the root causes, and identify the 2–3 highest-impact interventions for your business.</p>
            <div className="gfeats">
              <span className="gfeat"><b>✓</b> No sales pitch</span>
              <span className="gfeat"><b>✓</b> Specific to your results</span>
              <span className="gfeat"><b>✓</b> Free first call</span>
              <span className="gfeat"><b>✓</b> Detailed report via email</span>
            </div>
            {!emailSubmitted ? (
              <div className="gform">
                <input className="ginp ginp-pre" type="text" value={profile.name} readOnly />
                <input className="ginp ginp-pre" type="email" value={profile.email} readOnly />
                <input className="ginp" type="tel" placeholder="Phone number (optional)" value={profile.phone}
                  onChange={(e) => setProfile({ ...profile, phone: e.target.value })} />
                <button className="btn btn-g" style={{ width: "100%", marginTop: 4, fontSize: 16, padding: "16px 32px" }}
                  onClick={submitToFormspree} disabled={submitting}>
                  {submitting ? "Sending..." : "Book My Diagnostic Call →"}
                </button>
                {submitError && (
                  <p style={{ fontFamily: "'DM Sans',sans-serif", fontSize: 13, color: "#C25550", marginTop: 12 }}>
                    Something went wrong. Please try again or email us at pradeep@whyandhow.in
                  </p>
                )}
              </div>
            ) : (
              <div className="gsuccess">
                <h3>✓ We've received your request, {profile.name.split(" ")[0]}!</h3>
                <p>Your diagnostic summary has been sent to <strong>{profile.email}</strong>. We'll be in touch within 24 hours to schedule your call.</p>
              </div>
            )}
          </div>

          {/* Final CTA */}
          <div className="cta-end">
            <h3>Want to learn more about Why & How Advisory?</h3>
            <p>We work with business owners to build the structure, systems, and people foundations that make growth sustainable — not stressful.</p>
            <div style={{ display: "flex", gap: 12, justifyContent: "center", flexWrap: "wrap" }}>
              <button className="btn btn-p" onClick={() => window.open("https://whyandhow.in", "_blank")}>Explore Our Services →</button>
              <button className="btn btn-o" onClick={() => { setPhase("intro"); setAnswers({}); setEmailSubmitted(false); }}>Retake Assessment</button>
            </div>
          </div>

        </div>
      )}
    </div>
  );
};

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(React.createElement(OpEx360));
</script>
</body>
</html>
